name: Deploy to Production

on:
  push:
    branches:
      - main
    paths:
      - 'src/**'
      - 'build.gradle'
      - 'Dockerfile'
      - '.github/workflows/deploy-prod.yml'
      - '.dockerignore'
  
  workflow_dispatch:
    inputs:
      reason:
        description: 'Deployment reason'
        required: false
        default: 'Manual deployment'

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      # ============================================
      # 배포 정보 로깅
      # ============================================
      - name: Log deployment info
        run: |
          echo "🚀 Deployment triggered"
          echo "Event: ${{ github.event_name }}"
          echo "Branch: ${{ github.ref }}"
          echo "Commit: ${{ github.sha }}"
          echo "Author: ${{ github.actor }}"
          
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "📝 Manual deployment"
            echo "Reason: ${{ github.event.inputs.reason }}"
          else
            echo "✅ Automatic deployment from PR merge"
          fi
      
      # ============================================
      # 1. 코드 체크아웃
      # ============================================
      - name: Checkout code
        uses: actions/checkout@v4

      # ============================================
      # 2. JDK 21 설정
      # ============================================
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'gradle'

      # ============================================
      # 3. Gradle 권한 설정
      # ============================================
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # ============================================
      # 4. 테스트 실행
      # ============================================
      - name: Run tests
        run: ./gradlew test --no-daemon

      # ============================================
      # 5. JAR 빌드
      # ============================================
      - name: Build with Gradle
        run: ./gradlew clean bootJar --no-daemon

      # ============================================
      # 6. Docker Buildx 설정
      # ============================================
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ============================================
      # 7. Docker Hub 로그인
      # ============================================
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}

      # ============================================
      # 8. Docker 이미지 빌드 & 푸시 (amd64 명시)
      # ============================================
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          platforms: linux/amd64
          tags: |
            ${{ secrets.DOCKER_HUB_USERNAME }}/mztk-be:latest
            ${{ secrets.DOCKER_HUB_USERNAME }}/mztk-be:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ============================================
      # 9. EC2 배포
      # ============================================
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.EC2_PUBLIC_IP }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_KEY }}
          script: |
            # 앱 디렉토리로 이동
            cd ~/apps

            # SSM Parameter Store에서 최신 환경변수 pull → ~/apps/.env 재생성
            ./refresh-env.sh

            # Docker Hub 로그인 (Private Repository 접근용)
            echo "${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}" | docker login -u "${{ secrets.DOCKER_HUB_USERNAME }}" --password-stdin
            
            # Docker Hub에서 최신 이미지 pull
            docker pull ${{ secrets.DOCKER_HUB_USERNAME }}/mztk-be:latest
            
            # 기존 컨테이너 중지 및 제거
            docker stop mztk-prod || true
            docker rm mztk-prod || true
            
            # 새 컨테이너 실행
            docker run -d \
              --name mztk-prod \
              --restart unless-stopped \
              -p 8080:8080 \
              -e SPRING_PROFILES_ACTIVE=prod \
              --env-file ~/apps/.env \
              ${{ secrets.DOCKER_HUB_USERNAME }}/mztk-be:latest
            
            # 오래된 이미지 정리
            docker image prune -f
            
            # 배포 확인
            echo "⏳ Waiting for application to start..."
            
            # 컨테이너 상태 확인
            docker ps | grep mztk-prod

            # 초기 20초 sleep
            sleep 20
            
            # 헬스체크 (재시도 로직)
            echo "🏥 Starting health check (max 60 seconds)..."
            for i in {1..12}; do
              echo "Attempt $i/12..."
              if curl -f -s http://localhost:8080/actuator/health > /dev/null 2>&1; then
                echo "✅ Health check passed!"
                curl http://localhost:8080/actuator/health
                break
              fi
              
              if [ $i -eq 12 ]; then
                echo "❌ Health check failed after 60 seconds!"
                echo "📋 Container status:"
                docker ps | grep mztk-prod
                echo "📋 Last 50 lines of logs:"
                docker logs --tail 50 mztk-prod
                exit 1
              fi
              
              echo "Waiting 5 seconds before retry..."
              sleep 5
            done
            
            echo "✅ Deployment successful!"
