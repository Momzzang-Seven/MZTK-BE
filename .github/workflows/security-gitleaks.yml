name: Gitleaks Scan (CLI)

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main, dev ]
  workflow_dispatch:

jobs:
  gitleaks:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install gitleaks
        run: |
          GITLEAKS_VERSION=8.30.0
          curl -sL https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz \
            | tar xz
          sudo mv gitleaks /usr/local/bin/gitleaks

      - name: Run gitleaks
        env:
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}
        run: |
          set +e
          gitleaks detect \
            --source=. \
            --no-git \
            --redact \
            --report-format json \
            --report-path gitleaks.json
      
          EXIT_CODE=$?
          echo "gitleaks exit code: $EXIT_CODE"
      
          echo "===== gitleaks report (json) ====="
          cat gitleaks.json || echo "no report file"
      
          exit $EXIT_CODE

