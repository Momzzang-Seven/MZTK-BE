name: Gitleaks Scan

on: [push, pull_request]

jobs:
  gitleaks:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Run Gitleaks
      uses: gitleaks/gitleaks-action@v2
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        license: ${{ secrets.GITLEAKS_LICENSE }}
        args: detect --source=. --no-git --redact
