name: Security - Gitleaks

on:
  pull_request:
    branches: [ "main", "dev" ]
  push:
    branches-ignore:
      - "main"
      - "dev"

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        with:
          args: detect --source=. --no-git --redact
