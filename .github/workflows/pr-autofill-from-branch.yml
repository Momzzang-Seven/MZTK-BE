name: Autofill PR from branch

on:
  pull_request:
    types: [ opened, edited, synchronize, reopened ]

permissions:
  contents: read
  pull-requests: write

jobs:
  autofill-pr:
    runs-on: ubuntu-latest

    steps:
      - name: Autofill PR title & body
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const pr = context.payload.pull_request;

            if (!pr) {
              console.log("No pull_request in context. Skipping.");
              return;
            }

            const branchName = pr.head?.ref;
            const baseBranch = pr.base?.ref;

            console.log("Base:", baseBranch, "Head:", branchName);

            // 값 없으면 안전하게 종료
            if (!branchName || !baseBranch) {
              console.log("Missing head or base branch. Skipping.");
              return;
            }

            //
            // dev 로 가는 PR + feat/* 브랜치만 자동 처리
            //
            if (baseBranch !== "dev") {
              console.log("Base branch is not dev. Skipping autofill.");
              return;
            }

            if (!branchName.startsWith("feat/")) {
              console.log("Head branch is not feat/*. Skipping autofill.");
              return;
            }

            //
            // 브랜치 파싱
            // 예: feat/MOM-144-사용자는-회원탈퇴를-할-수-있어야-한다
            //
            const parts = branchName.split("/", 2);
            if (parts.length < 2) {
              console.log("Branch name does not contain '/'. Skipping.");
              return;
            }

            const prefix = parts[0];   // "feat"
            const rest = parts[1];     // "MOM-144-사용자는-회원탈퇴를-할-수-있어야-한다"

            const restParts = rest.split("-");
            if (restParts.length < 3) {
              console.log("Branch name does not look like JIRA-123-some-title. Skipping.");
              return;
            }

            const jiraKeyPrefix = restParts[0];   // "MOM"
            const jiraKeyNum    = restParts[1];   // "144"
            const titleParts    = restParts.slice(2); // ["사용자는", "회원탈퇴를", "할", "수", "있어야", "한다"]

            const jiraKey = `${jiraKeyPrefix}-${jiraKeyNum}`;          // "MOM-144"
            const rawTitle = titleParts.join("-");                      // "사용자는-회원탈퇴를-할-수-있어야-한다"
            const formattedTitle = rawTitle.replace(/_/g, " ");         // 언더스코어만 공백으로 치환

            const generatedTitle = `[${jiraKey}] ${prefix}: ${formattedTitle}`;
            console.log("Generated title:", generatedTitle);

            const body = pr.body || "";

            // 새로 만들 PR 본문 템플릿
            const generatedBodyLines = [
              "<!-- AUTO-GENERATED-PR-BODY -->",
              "",
              "## 관련 이슈",
              `- [${jiraKey}]`,
              "",
              "## 작업 내용",
              "- ",
              "",
              "## 변경 범위",
              "- ",
              "",
              "## 테스트",
              "- [ ] 테스트 코드 작성 및 통과",
              "- [ ] 로컬 스모크 테스트 완료",
              ""
            ];
            const generatedBody = generatedBodyLines.join("\n");

            //
            //  절충 모드 규칙
            //  - 제목: 항상 덮어쓰기 (일관성 강제)
            //  - 본문: 비었거나 자동 생성 마커가 있을 때만 덮어쓰기
            //
            const shouldUpdateBody =
              !body.trim().length ||
              body.includes("<!-- AUTO-GENERATED-PR-BODY -->");

            // 🔥 여기서 이미 같은 내용이면 더 이상 업데이트하지 않고 종료 → 무한루프 방지
            const isTitleSame = pr.title === generatedTitle;
            const isBodySame = body === generatedBody;

            if (isTitleSame && (!shouldUpdateBody || isBodySame)) {
              console.log("Title/body already generated. No changes needed. Skipping update.");
              return;
            }

            console.log("Should update body?", shouldUpdateBody);

            try {
              await github.rest.pulls.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: pr.number,
                title: generatedTitle,
                body: shouldUpdateBody ? generatedBody : pr.body
              });

              console.log("PR updated successfully");
            } catch (error) {
              console.error("Failed to update PR:", error);
              throw error;
            }
