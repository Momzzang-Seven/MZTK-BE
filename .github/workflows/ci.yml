name: CI

on:
  push:
    branches: [ "main", "dev" ]   # 필요 시 브랜치 이름 수정
  pull_request:
    branches: [ "main", "dev" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Run all checks (format + lint + test)
        run: ./gradlew clean check --no-daemon
