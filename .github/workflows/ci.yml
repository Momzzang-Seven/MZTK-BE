name: CI

on:
  pull_request:
    branches: [ "main", "dev" ]
  push:
    branches-ignore:
      - "main"
      - "dev"

jobs:
  ci:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgis/postgis:17-3.4
        env:
          POSTGRES_USER: mztk
          POSTGRES_PASSWORD: mztk
          POSTGRES_DB: mztk_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Clean project
        run: ./gradlew clean --no-daemon

      - name: Check .env.example coverage
        run: bash scripts/ci/check-env-coverage.sh

      - name: Verify code format (Spotless)
        run: ./gradlew spotlessCheck --no-daemon
        
      - name: Run static analysis (Checkstyle)
        run: ./gradlew checkstyleMain --no-daemon

      - name: Run tests
        env:
          DB_URL_E2E: jdbc:postgresql://localhost:5432/mztk_ci
          DB_USERNAME: mztk
          DB_PASSWORD: mztk
        run: ./gradlew test --no-daemon