version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: ${POSTGRES_CONTAINER_NAME}
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - project-network

volumes:
  postgres-data:
    name: ${POSTGRES_VOLUME_NAME:-mztk-postgres-data}

networks:
  project-network:
    name: ${PROJECT_NETWORK:-mztk-network}
