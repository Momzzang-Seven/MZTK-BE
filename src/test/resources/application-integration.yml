# integration 프로파일 활성화 시 적용 (Local Server + Real PostgreSQL E2E 테스트용)
# 기본 application.yml(H2)의 설정을 아래 값으로 덮어씁니다.
#
# ※ 로컬 개발 DB는 ddl-auto: update(Flyway 없이 Hibernate가 스키마 관리)로 운영됩니다.
#   E2E 테스트도 동일한 방식을 사용해 Flyway 충돌을 방지합니다.
spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/mztk_dev}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver

  # Flyway 비활성화 – 개발 DB는 Hibernate ddl-auto 로 스키마 관리
  flyway:
    enabled: false

  jpa:
    defer-datasource-initialization: false
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false
      jakarta.persistence.lock.timeout: 5000

  sql:
    init:
      mode: never

logging:
  level:
    root: WARN
    momzzangseven: INFO

cloud:
  aws:
    region:
      static: ap-northeast-2
      auto: false
    stack:
      auto: false
    s3:
      bucket: test-bucket
      presigned-url:
        expiry-seconds: 300
    credentials:
      access-key: test-access-key
      secret-key: test-secret-key
