spring:
  profiles:
    active: ${SPRING_PROFILES_ACTIVE}

  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  sql:
    init:
      mode: always
      data-locations:
        - classpath:db/seed/level_policies.sql
        - classpath:db/seed/xp_policies.sql

  jpa:
    defer-datasource-initialization: true
    open-in-view: false
    show-sql: true                  # dev에서만 권장 (prod에서 override)
    hibernate:
      ddl-auto: update              # dev에서만 허용 (prod에서 override)
    properties:
      hibernate:
        format_sql: true
      javax.persistence.lock.timeout: 5000 # lock timeout 5초

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

  jackson:
    serialization:
      write-dates-as-timestamps: false
    time-zone: Asia/Seoul

security:
  cors:
    allowed-origins:
      - https://mztk.vercel.app

auth:
  web-client:
    connect-timeout-millis: 3000
    response-timeout-seconds: 5
    block-timeout-seconds: 5

kakao:
  auth:
    client: ${KAKAO_CLIENT_ID}
    redirect: http://localhost:3000/callback     # 편의 기본값(필수 아님)
  api:
    token-uri: https://kauth.kakao.com/oauth/token
    userinfo-uri: https://kapi.kakao.com/v2/user/me
    unlink-uri: https://kapi.kakao.com/v1/user/unlink
    admin-key: ${KAKAO_ADMIN_KEY}
    rest-api-key: ${KAKAO_REST_API_KEY}
    geocoding:
      base-url: https://dapi.kakao.com
      address-search-path: /v2/local/search/address.json
      coord-to-address-path: /v2/local/geo/coord2address.json
      timeout: 5000

google:
  oauth:
    client-id: ${GOOGLE_CLIENT_ID}
    client-secret: ${GOOGLE_CLIENT_SECRET}
    redirect-uri: http://localhost:3000/callback  # 편의 기본값(필수 아님)
  api:
    token-uri: https://oauth2.googleapis.com/token
    userinfo-uri: https://openidconnect.googleapis.com/v1/userinfo
    revoke-uri: https://oauth2.googleapis.com/revoke


# 튜닝/정책값은 yml 상수로 유지
withdrawal:
  external-disconnect:
    fixed-delay: 60000
    batch-size: 20
    max-attempts: 10
    initial-backoff: 300000
    max-backoff: 3600000
    cleanup:
      fixed-delay: 86400000
      success-retention-days: 7
      failed-retention-days: 0
  hard-delete:
    retention-days: 30
    batch-size: 200
    cron: "0 0 3 * * *"
    zone: Asia/Seoul

logging:
  level:
    root: INFO
    org.springframework.web: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE

level:
  retention:
    retention-days: 365
    batch-size: 5000
    cron: "0 0 4 * * *"
    zone: Asia/Seoul

management:
  endpoints:
    web:
      exposure:
        include: health, info

jwt:
  secret: ${JWT_SECRET}
  access-token-expiration: 900000
  refresh-token-expiration: 604800000
  step-up-token-expiration: 300000
  issuer: MZTK-BE
  audience: MZTK-Client

web3:
  # === 공통 인프라 (SSOT) ===
  chain-id: ${WEB3_CHAIN_ID}
  confirmations: 1
  gas-policy: EIP1559

  rpc:
    main: ${WEB3_RPC_MAIN}
    sub: ${WEB3_RPC_SUB}

  explorer:
    base-url: ${WEB3_EXPLORER_BASE_URL}
    api-url: https://api.etherscan.io/v2/api     # 편의 기본값(필수 아님)
    api-key: ${WEB3_EXPLORER_API_KEY}            # prod에서 보통 필요

  # 로그인/지갑 연결(서명) - 온체인 결합은 chain-id만
  challenge:
    ttl-seconds: 300
    eip4361:
      domain: "MZTK"
      uri: "https://mztk.com"                    # prod 도메인(필수 아님, prod에서 override 권장)
      version: "1"
      chain-id: ${WEB3_CHAIN_ID}

  # EIP-712: verifying-contract는 환경/배포마다 바뀌는 값(필수 env)
  eip712:
    domain-name: "MomzzangSeven"
    domain-version: "1"
    chain-id: ${WEB3_CHAIN_ID}
    verifying-contract: ${WEB3_EIP712_VERIFYING_CONTRACT}

  wallet:
    hard-delete:
      retention-days: 30
      batch-size: 200
      cron: "0 0 4 * * *"
      zone: "Asia/Seoul"

  # 보상 토큰(트레저리 → 유저)
  reward-token:
    enabled: true
    token-contract-address: ${MZTK_TOKEN_CONTRACT_ADDRESS}
    decimals: 18

    # 임계치/워커 튜닝은 yml 상수 유지
    treasury:
      key-encryption-key-b64: ${TREASURY_KEY_ENCRYPTION_KEY_B64}
      treasury-address: ${TREASURY_WALLET_ADDRESS}
      provisioning:
        enabled: ${WEB3_TREASURY_PROVISIONING_ENABLED}

    prevalidate:
      eth-warning-threshold: ${TREASURY_ETH_WARNING_THRESHOLD}
      eth-critical-threshold: ${TREASURY_ETH_CRITICAL_THRESHOLD}

    gas:
      default-gas-limit: 120000
      default-max-priority-fee-per-gas-wei: 1000000000
      max-fee-multiplier: 2

    worker:
      claim-ttl-seconds: 120
      receipt-timeout-seconds: 900
      receipt-poll-min-seconds: 1
      receipt-poll-max-seconds: 5
      retry-backoff-seconds: 60

  # EIP-7702 (유저 트랜잭션 스폰서/대납)
  eip7702:
    enabled: true                               # 기본 on, 필요 시 prod에서 override

    delegation:
      contract-address: ${WEB3_EIP7702_DELEGATION_CONTRACT_ADDRESS}
      nonce-tracker-address: ${WEB3_EIP7702_NONCE_TRACKER_ADDRESS}
      batch-impl-address: ${WEB3_EIP7702_BATCH_IMPL_ADDRESS}
      default-receiver-address: ${WEB3_EIP7702_DEFAULT_RECEIVER_ADDRESS}

    sponsor:
      enabled: true
      key-encryption-key-b64: ${SPONSOR_KEY_ENCRYPTION_KEY_B64}
      wallet-alias: reward-treasury

      # 안전장치는 yml 상수 유지(운영 중 급변할 값 아니면)
      max-gas-limit: 500000
      max-max-fee-gwei: 60
      max-priority-fee-gwei: 2
      daily-sponsor-cap-eth: 0.5
      per-day-user-cap-eth: 0.02

    authorization:
      ttl-seconds: 300
      nonce-policy: ONCHAIN
      require-chain-id-match: true
      max-auth-list-length: 1

    execution:
      allowed-target-contracts: []               # prod에서만 채우는 것을 권장
      blocked-function-selectors: []             # prod에서만 채우는 것을 권장

    cleanup:
      enabled: true
      retention-days: 180
      batch-size: 500
      cron: "0 30 4 * * *"
      zone: "Asia/Seoul"

    observability:
      log-auth-hash: true
      log-user-op: false

location:
  verification:
    radius-meters: 5.0 # Location verification radius; 5m
