spring:
  profiles:
    active: ${SPRING_PROFILES_ACTIVE}

  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  sql:
    init:
      mode: always
      data-locations:
        - classpath:db/seed/level_policies.sql
        - classpath:db/seed/xp_policies.sql

  jpa:
    defer-datasource-initialization: true
    open-in-view: false
    show-sql: true                  # dev에서는 SQL 확인
    hibernate:
      ddl-auto: update              # dev에서만 허용
    properties:
      hibernate:
        format_sql: true
      javax.persistence.lock.timeout: 5000 # lock timeout 5초

  jackson:
    serialization:
      write-dates-as-timestamps: false
    time-zone: Asia/Seoul

kakao:
  auth:
    client: ${KAKAO_CLIENT_ID}
    redirect: ${KAKAO_REDIRECT_URI:http://localhost:3000/callback}
  api:
    token-uri: https://kauth.kakao.com/oauth/token
    userinfo-uri: https://kapi.kakao.com/v2/user/me
    unlink-uri: https://kapi.kakao.com/v1/user/unlink
    admin-key: ${KAKAO_ADMIN_KEY}
google:
  oauth:
    client-id: ${GOOGLE_CLIENT_ID}
    client-secret: ${GOOGLE_CLIENT_SECRET}
    redirect-uri: ${GOOGLE_REDIRECT_URI:http://localhost:3000/callback}
  api:
    token-uri: https://oauth2.googleapis.com/token
    userinfo-uri: https://openidconnect.googleapis.com/v1/userinfo
    revoke-uri: https://oauth2.googleapis.com/revoke

withdrawal:
  external-disconnect:
    fixed-delay: ${WITHDRAWAL_EXTERNAL_DISCONNECT_FIXED_DELAY:60000}  # 1 min
    batch-size: ${WITHDRAWAL_EXTERNAL_DISCONNECT_BATCH_SIZE:20}
    max-attempts: ${WITHDRAWAL_EXTERNAL_DISCONNECT_MAX_ATTEMPTS:10}
    initial-backoff: ${WITHDRAWAL_EXTERNAL_DISCONNECT_INITIAL_BACKOFF:300000}
    max-backoff: ${WITHDRAWAL_EXTERNAL_DISCONNECT_MAX_BACKOFF:3600000}
    cleanup:
      fixed-delay: ${WITHDRAWAL_EXTERNAL_DISCONNECT_CLEANUP_FIXED_DELAY:86400000} # 1 day
      success-retention-days: ${WITHDRAWAL_EXTERNAL_DISCONNECT_SUCCESS_RETENTION_DAYS:7}
      failed-retention-days: ${WITHDRAWAL_EXTERNAL_DISCONNECT_FAILED_RETENTION_DAYS:0}
  hard-delete:
    retention-days: ${WITHDRAWAL_HARD_DELETE_RETENTION_DAYS:30}
    batch-size: ${WITHDRAWAL_HARD_DELETE_BATCH_SIZE:200}
    cron: ${WITHDRAWAL_HARD_DELETE_CRON:0 0 3 * * *}
    zone: ${WITHDRAWAL_HARD_DELETE_ZONE:Asia/Seoul}

logging:
  level:
    root: INFO
    org.springframework.web: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE

level:
  retention:
    retention-days: 365
    batch-size: 5000
    cron: "0 0 4 * * *"
    zone: Asia/Seoul

management:
  endpoints:
    web:
      exposure:
        include: health, info

jwt:
  secret: ${JWT_SECRET}
  access-token-expiration: 900000      # 15 mins (in milliseconds)
  refresh-token-expiration: 604800000   # 7 days (in milliseconds)
  step-up-token-expiration: 300000    # 5 mins (in milliseconds)
  issuer: MZTK-BE
  audience: MZTK-Client

web3:
  challenge:
    ttl-seconds: 300  # 5 Minutes
    eip4361:
      domain: "MZTK"
      uri: "https://mztk.com" # MUST USE THE SERVICING DOMAIN URI
      version: "1"
      chain-id: "1"
  eip712:
    domain-name: "MomzzangSeven"
    domain-version: "1"
    chain-id: 11155111  # Sepolia testnet
    verifying-contract: "0xcccccccccccccccccccccccccccccccccccccccc"