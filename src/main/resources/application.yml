spring:
  profiles:
    active: ${SPRING_PROFILES_ACTIVE}
  ai:
    model:
      chat: none

  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  # sql: init: mode: always 블록은 삭제하고, dev에만 남김. prod에서는 mode: never.

  jpa:
    defer-datasource-initialization: true
    open-in-view: false
    show-sql: true                  # dev에서만 권장 (prod에서 override)
    hibernate:
      ddl-auto: update              # dev에서만 허용 (prod에서 override)
    properties:
      hibernate:
        format_sql: true
      jakarta.persistence.lock.timeout: 5000 # lock timeout 5초

  jackson:
    serialization:
      write-dates-as-timestamps: false
    time-zone: Asia/Seoul

info:
  app:
    name: ${APP_NAME:MZTK-BE}
    version: ${APP_VERSION:0.0.1-SNAPSHOT}
    description: ${APP_DESCRIPTION:MZTK-BE Backend Service}
    environment: ${APP_ENVIRONMENT:local}

security:
  cors:
    allowed-origins:
      - https://mztk.vercel.app

auth:
  web-client:
    connect-timeout-millis: 3000
    response-timeout-seconds: 5
    block-timeout-seconds: 5

kakao:
  auth:
    client: ${KAKAO_CLIENT_ID}
    redirect: http://localhost:3000/callback     # 편의 기본값(필수 아님)
  api:
    token-uri: https://kauth.kakao.com/oauth/token
    userinfo-uri: https://kapi.kakao.com/v2/user/me
    unlink-uri: https://kapi.kakao.com/v1/user/unlink
    admin-key: ${KAKAO_ADMIN_KEY}
    rest-api-key: ${KAKAO_REST_API_KEY}
    geocoding:
      base-url: https://dapi.kakao.com
      address-search-path: /v2/local/search/address.json
      coord-to-address-path: /v2/local/geo/coord2address.json
      timeout: 5000

google:
  oauth:
    client-id: ${GOOGLE_CLIENT_ID}
    client-secret: ${GOOGLE_CLIENT_SECRET}
    redirect-uri: http://localhost:3000/callback  # 편의 기본값(필수 아님)
  api:
    token-uri: https://oauth2.googleapis.com/token
    userinfo-uri: https://openidconnect.googleapis.com/v1/userinfo
    revoke-uri: https://oauth2.googleapis.com/revoke


# 튜닝/정책값은 yml 상수로 유지
withdrawal:
  external-disconnect:
    fixed-delay: 60000
    batch-size: 20
    max-attempts: 10
    initial-backoff: 300000
    max-backoff: 3600000
    cleanup:
      fixed-delay: 86400000
      success-retention-days: 7
      failed-retention-days: 0
  hard-delete:
    retention-days: 30
    batch-size: 200
    cron: "0 0 3 * * *"
    zone: Asia/Seoul

comment:
  hard-delete:
    retention-days: ${COMMENT_HARD_DELETE_RETENTION_DAYS:30}
    batch-size: ${COMMENT_HARD_DELETE_BATCH_SIZE:100}
    cron: ${ASYNC_CLEANUP_CRON:0 30 * * * *}
    zone: ${ASYNC_CLEANUP_ZONE:Asia/Seoul}

answer:
  orphan-cleanup:
    batch-size: ${ANSWER_ORPHAN_CLEANUP_BATCH_SIZE:100}
    cron: ${ASYNC_CLEANUP_CRON:0 30 * * * *}
    zone: ${ASYNC_CLEANUP_ZONE:Asia/Seoul}

logging:
  level:
    root: INFO
    org.springframework.web: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE

level:
  retention:
    retention-days: 365
    batch-size: 5000
    cron: "0 0 4 * * *"
    zone: Asia/Seoul

management:
  info:
    env:
      enabled: true
  endpoints:
    web:
      exposure:
        include: health, info
  endpoint:
    health:
      show-details: when_authorized
      roles: ROLE_ADMIN

jwt:
  secret: ${JWT_SECRET}
  access-token-expiration: 900000
  refresh-token-expiration: 604800000
  step-up-token-expiration: 300000
  issuer: MZTK-BE
  audience: MZTK-Client

web3:
  # === 공통 인프라 (SSOT) ===
  chain-id: ${WEB3_CHAIN_ID}
  confirmations: 1
  gas-policy: EIP1559

  rpc:
    main: ${WEB3_RPC_MAIN}
    sub: ${WEB3_RPC_SUB}

  explorer:
    base-url: ${WEB3_EXPLORER_BASE_URL}
    api-url: ${WEB3_EXPLORER_API_URL:https://api.etherscan.io/v2/api}     # 편의 기본값(필수 아님)
    api-key: ${WEB3_EXPLORER_API_KEY}            # prod에서 보통 필요

  # 로그인/지갑 연결(서명) - 온체인 결합은 chain-id만
  challenge:
    ttl-seconds: 300
    eip4361:
      domain: "MZTK"
      uri: "https://mztk.com"                    # prod 도메인(필수 아님, prod에서 override)
      version: "1"
      chain-id: ${WEB3_CHAIN_ID}

  # EIP-712: verifying-contract는 환경/배포마다 바뀌는 값(필수 env)
  eip712:
    domain-name: "MomzzangSeven"
    domain-version: "1"
    chain-id: ${WEB3_CHAIN_ID}
    verifying-contract: ${WEB3_EIP712_VERIFYING_CONTRACT}

  wallet:
    hard-delete:
      retention-days: 30
      batch-size: 200
      cron: "0 0 4 * * *"
      zone: "Asia/Seoul"

  # 보상 토큰(트레저리 → 유저)
  reward-token:
    enabled: true
    token-contract-address: ${MZTK_TOKEN_CONTRACT_ADDRESS}
    decimals: 18

    # 임계치/워커 튜닝은 yml 상수 유지
    treasury:
      wallet-alias: reward-treasury
      key-encryption-key-b64: ${TREASURY_KEY_ENCRYPTION_KEY_B64}
      treasury-address: ${TREASURY_WALLET_ADDRESS}
      provisioning:
        enabled: ${WEB3_TREASURY_PROVISIONING_ENABLED}

    prevalidate:
      eth-warning-threshold: ${TREASURY_ETH_WARNING_THRESHOLD}
      eth-critical-threshold: ${TREASURY_ETH_CRITICAL_THRESHOLD}

    gas:
      default-gas-limit: 120000
      default-max-priority-fee-per-gas-wei: 1000000000
      max-fee-multiplier: 2

    worker:
      claim-ttl-seconds: 120
      receipt-timeout-seconds: 900
      receipt-poll-min-seconds: 1
      receipt-poll-max-seconds: 5
      retry-backoff-seconds: 60

  # EIP-7702 (유저 트랜잭션 스폰서/대납)
  eip7702:
    enabled: true                               # 기본 on, 필요 시 prod에서 override

    delegation:
      contract-address: ${WEB3_EIP7702_DELEGATION_CONTRACT_ADDRESS}
      nonce-tracker-address: ${WEB3_EIP7702_NONCE_TRACKER_ADDRESS}
      batch-impl-address: ${WEB3_EIP7702_BATCH_IMPL_ADDRESS}
      default-receiver-address: ${WEB3_EIP7702_DEFAULT_RECEIVER_ADDRESS}

    sponsor:
      enabled: true
      key-encryption-key-b64: ${SPONSOR_KEY_ENCRYPTION_KEY_B64}
      wallet-alias: sponsor-treasury

      # 안전장치는 yml 상수 유지(운영 중 급변할 값 아니면)
      max-gas-limit: 500000
      max-max-fee-gwei: 60
      max-priority-fee-gwei: 2
      max-transfer-amount-eth: 5000
      per-tx-cap-eth: 0.002
      daily-sponsor-cap-eth: 0.5
      per-day-user-cap-eth: 0.02

    authorization:
      ttl-seconds: 300
      eip1559-ttl-seconds: 90
      nonce-policy: ONCHAIN
      require-chain-id-match: true
      max-auth-list-length: 1

    execution:
      allowed-delegate-targets:
        - ${WEB3_EIP7702_BATCH_IMPL_ADDRESS:}
      allowed-call-targets:
        - ${MZTK_TOKEN_CONTRACT_ADDRESS:}
        - ${WEB3_ESCROW_QNA_CONTRACT_ADDRESS:}
        - ${WEB3_ESCROW_MARKETPLACE_CONTRACT_ADDRESS:}
      allowed-target-contracts: []               # deprecated fallback. use split allowlists above
      blocked-function-selectors: []             # prod에서만 채우는 것을 권장

    cleanup:
      enabled: true
      retention-days: 180
      batch-size: 500
      cron: "0 30 4 * * *"
      zone: "Asia/Seoul"

    observability:
      log-auth-hash: true
      log-user-op: false
  escrow:
    marketplace-contract-address: ${WEB3_ESCROW_MARKETPLACE_CONTRACT_ADDRESS}
    qna-contract-address: ${WEB3_ESCROW_QNA_CONTRACT_ADDRESS}
  transfer:
    legacy-question-reward-handler-enabled: false

location:
  verification:
    radius-meters: 5.0 # Location verification radius; 5m

cloud:
  aws:
    region:
      static: ap-northeast-2
      auto: false
    stack:
      auto: false
    s3:
      bucket: ${AWS_S3_BUCKET}
      url-prefix: https://${AWS_S3_BUCKET}.s3.ap-northeast-2.amazonaws.com/
      presigned-url:
        expiry-seconds: 300  # 5m
    credentials:
      access-key: ${AWS_IAM_ACCESS_KEY}
      secret-key: ${AWS_IAM_SECRET_KEY}

image:
  post-orphan-cleanup:
    batch-size: ${IMAGE_POST_ORPHAN_CLEANUP_BATCH_SIZE:100}
    cron: ${ASYNC_CLEANUP_CRON:0 30 * * * *}
    zone: ${ASYNC_CLEANUP_ZONE:Asia/Seoul}
  answer-orphan-cleanup:
    batch-size: ${IMAGE_ANSWER_ORPHAN_CLEANUP_BATCH_SIZE:100}
    cron: ${ASYNC_CLEANUP_CRON:0 30 * * * *}
    zone: ${ASYNC_CLEANUP_ZONE:Asia/Seoul}
  pending-cleanup:
    retention-hours: 5
    batch-size: 100
    cron: 0 0 0/1 * * *
    zone: Asia/Seoul
  unlinked-cleanup:
    retention-hours: 5
    batch-size: 100
    cron: 0 0 3 * * *
    zone: Asia/Seoul

verification:
  ai:
    api-key: ${GEMINI_API_KEY:}
    model: gemini-2.5-flash-lite
    timeout-seconds: 12
    retry-count: 2
    stub-enabled: false
  heif:
    enabled: true
    decoder-policy: requires-imageio-plugin
  image:
    max-original-bytes: 5242880
    max-pixels: 25000000

lambda:
  webhook:
    secret: ${LAMBDA_WEBHOOK_SECRET}

mztk:
  admin:
    seed:
      seed-count: ${ADMIN_SEED_COUNT:2}
      delivery-target: ${ADMIN_SEED_DELIVERY_TARGET:mztk/admin/bootstrap-delivery}
    recovery:
      secret-id: ${ADMIN_RECOVERY_SECRET_ID:mztk/admin/recovery-anchor}