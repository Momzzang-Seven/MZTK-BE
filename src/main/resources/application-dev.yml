spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/mztk_dev}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
  
  sql:
    init:
      mode: always
      data-locations:
        - classpath:db/seed/level_policies.sql
        - classpath:db/seed/xp_policies.sql
        - classpath:db/seed/web3_treasury_keys.sql
        - classpath:db/seed/user_wallets_status_constraint.sql
  
  jpa:
    defer-datasource-initialization: true
    hibernate:
      ddl-auto: update  # 로컬 개발: 자동 스키마 생성
    show-sql: true
  
  flyway:
    enabled: false  # 로컬은 Flyway 비활성화

security:
  cors:
    allowed-origins:
      - http://localhost:5173
      - http://localhost:3000

logging:
  level:
    root: INFO
    org.springframework.web: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE

kakao:
  auth:
    redirect: http://localhost:3000/callback

google:
  oauth:
    redirect-uri: http://localhost:3000/callback

web3:
  challenge:
    eip4361:
      uri: http://localhost:3000

  explorer:
    base-url: https://sepolia-optimism.etherscan.io

  eip7702:
    enabled: true  # dev에서 필요하면 true로

mztk:
  admin:
    recovery:
      anchor: "anchor-only-for-dev"