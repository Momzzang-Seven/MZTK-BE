info:
  app:
    name: "MZTK-BE (Development)"
    version: "0.0.1-SNAPSHOT"
    description: "MZTK-BE Backend Service for Development"
    environment: "dev"

security:
  cors:
    allowed-origins:
      - http://localhost:5173
      - http://localhost:3000

kakao:
  auth:
    redirect: http://localhost:3000/callback

google:
  oauth:
    redirect-uri: http://localhost:3000/callback

web3:
  challenge:
    eip4361:
      uri: http://localhost:3000

  explorer:
    base-url: https://sepolia-optimism.etherscan.io

  eip7702:
    enabled: true  # dev에서 필요하면 true로