spring:
  datasource:
    url: ${DB_URL_PROD}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    hikari:
      maximum-pool-size: 20      # 2026-05-28 부하테스트(RESULT_LOAD): pool=10 이 단일 병목, RDS 여력 충분(conns 11/max 79)
      connection-timeout: 5000   # 30s → 5s: doomed 요청의 30초 슬롯 점유가 cascade 를 비가역화 → fail-fast

  sql:
    init:
      mode: never

  jpa:
    database: postgresql
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: none  # 핵심 1: validate → none
    show-sql: false
    properties:
      hibernate:
        format_sql: false
        default_batch_fetch_size: 100
      jakarta:
        persistence:
          schema-generation:
            database:
              action: none  # 핵심 2: 추가
    defer-datasource-initialization: false  # 핵심
  
  flyway:
    enabled: true  # Flyway 활성화
    baseline-on-migrate: true
    locations: classpath:db/migration
    schemas: public
    validate-on-migrate: true  # Flyway가 스키마 검증
    clean-disabled: true  # Prod에서 clean 금지
    baseline-version: 0
    placeholders:
      web3ChainId: ${WEB3_CHAIN_ID}

info:
  app:
    environment: prod

security:
  cors:
    allowed-origins:
      - ${PROD_DOMAIN}  # 실제 배포 도메인
      - ${TEST_DOMAIN}
      - https://mztk.vercel.app

logging:
  level:
    root: INFO
    org.springframework.web: INFO
    org.hibernate.SQL: WARN
    org.hibernate.type.descriptor.sql.BasicBinder: WARN

kakao:
  auth:
    redirect: ${KAKAO_REDIRECT_URI}

google:
  oauth:
    redirect-uri: ${GOOGLE_REDIRECT_URI}

web3:
  kms:
    enabled: true

  challenge:
    eip4361:
      uri: ${PROD_DOMAIN}

  eip7702:
    enabled: ${WEB3_EIP_7702_ENABLED}
    execution:
      allowed-delegate-targets:
        - ${WEB3_EIP7702_BATCH_IMPL_ADDRESS}
      allowed-call-targets:
        - ${MZTK_TOKEN_CONTRACT_ADDRESS}
        - ${WEB3_ESCROW_QNA_CONTRACT_ADDRESS}
        - ${WEB3_ESCROW_MARKETPLACE_CONTRACT_ADDRESS}
      allowed-approve-spenders:
        - ${WEB3_ESCROW_QNA_CONTRACT_ADDRESS}
        - ${WEB3_ESCROW_MARKETPLACE_CONTRACT_ADDRESS}
      allowed-target-contracts: []
      blocked-function-selectors: []
  marketplace:
    user-execution:
      fail-fast: true
    admin:
      fail-fast: ${WEB3_MARKETPLACE_ADMIN_FAIL_FAST:true}
      recovery:
        enabled: ${WEB3_MARKETPLACE_ADMIN_RECOVERY_ENABLED:true}
        batch-size: ${WEB3_MARKETPLACE_ADMIN_RECOVERY_BATCH_SIZE:100}
        max-batches-per-run: ${WEB3_MARKETPLACE_ADMIN_RECOVERY_MAX_BATCHES_PER_RUN:20}
        cron: "${WEB3_MARKETPLACE_ADMIN_RECOVERY_CRON:0 */5 * * * *}"
        zone: "${WEB3_MARKETPLACE_ADMIN_RECOVERY_ZONE:Asia/Seoul}"
      reconciliation:
        enabled: ${WEB3_MARKETPLACE_ADMIN_RECONCILIATION_ENABLED:true}
        batch-size: ${WEB3_MARKETPLACE_ADMIN_RECONCILIATION_BATCH_SIZE:100}
        max-batches-per-run: ${WEB3_MARKETPLACE_ADMIN_RECONCILIATION_MAX_BATCHES_PER_RUN:20}
        claim-stale-minutes: ${WEB3_MARKETPLACE_ADMIN_RECONCILIATION_CLAIM_STALE_MINUTES:5}
        cron: "${WEB3_MARKETPLACE_ADMIN_RECONCILIATION_CRON:0 */5 * * * *}"
        zone: "${WEB3_MARKETPLACE_ADMIN_RECONCILIATION_ZONE:Asia/Seoul}"
mztk:
  admin:
    bootstrap:
      enabled: true
    seed:
      seed-count: 2
      delivery-target: mztk/prod/admin/bootstrap-delivery
    recovery:
      rate-limit:
        trust-forwarded-for: true
