spring:
  datasource:
    url: ${DB_URL_PROD}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
  
  sql:
    init:
      mode: never

  jpa:
    database: postgresql
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: none  # 핵심 1: validate → none
    show-sql: false
    properties:
      hibernate:
        format_sql: false
        default_batch_fetch_size: 100
      jakarta:
        persistence:
          schema-generation:
            database:
              action: none  # 핵심 2: 추가
    defer-datasource-initialization: false  # 핵심
  
  flyway:
    enabled: true  # Flyway 활성화
    baseline-on-migrate: true
    locations: classpath:db/migration
    schemas: public
    validate-on-migrate: true  # Flyway가 스키마 검증
    clean-disabled: true  # Prod에서 clean 금지
    baseline-version: 0

info:
  app:
    environment: prod

security:
  cors:
    allowed-origins:
      - ${PROD_DOMAIN}  # 실제 배포 도메인
      - ${TEST_DOMAIN}
      - https://mztk.vercel.app

logging:
  level:
    root: INFO
    org.springframework.web: INFO
    org.hibernate.SQL: WARN
    org.hibernate.type.descriptor.sql.BasicBinder: WARN

kakao:
  auth:
    redirect: ${KAKAO_REDIRECT_URI}

google:
  oauth:
    redirect-uri: ${GOOGLE_REDIRECT_URI}

web3:
  kms:
    enabled: true

  challenge:
    eip4361:
      uri: ${PROD_DOMAIN}

  eip7702:
    enabled: ${WEB3_EIP_7702_ENABLED}
    execution:
      allowed-delegate-targets:
        - ${WEB3_EIP7702_BATCH_IMPL_ADDRESS}
      allowed-call-targets:
        - ${MZTK_TOKEN_CONTRACT_ADDRESS}
        - ${WEB3_ESCROW_QNA_CONTRACT_ADDRESS}
        - ${WEB3_ESCROW_MARKETPLACE_CONTRACT_ADDRESS}
      allowed-target-contracts: []
      blocked-function-selectors:
        - 0x095ea7b3                # approve (예시)
mztk:
  admin:
    bootstrap:
      enabled: true
    seed:
      seed-count: 2
      delivery-target: mztk/prod/admin/bootstrap-delivery
    recovery:
      rate-limit:
        trust-forwarded-for: true
