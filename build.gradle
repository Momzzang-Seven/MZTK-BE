plugins {
    id 'java'
    id 'org.springframework.boot' version '3.3.4'
    id 'io.spring.dependency-management' version '1.1.7'
    id 'com.diffplug.spotless' version '6.25.0'
    id 'checkstyle'
    id 'jacoco'
}

group = 'Momzzang-Seven'
version = '0.0.1-SNAPSHOT'
description = 'MZTK-BE'

java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(21)
    }
}

configurations {
    compileOnly {
        extendsFrom annotationProcessor
    }
}

repositories {
    mavenCentral()
}

dependencies {
    // Spring Boot Starters
    implementation 'org.springframework.boot:spring-boot-starter-web'
    implementation 'org.springframework.boot:spring-boot-starter-actuator'
    implementation 'org.springframework.boot:spring-boot-starter-data-jpa'
    implementation 'org.springframework.boot:spring-boot-starter-security'
    implementation 'org.springframework.boot:spring-boot-starter-aop'
    implementation 'org.springframework.boot:spring-boot-starter-validation'
    implementation 'org.springframework.boot:spring-boot-starter-oauth2-client'
    implementation 'org.springframework.boot:spring-boot-starter-webflux'

    // QueryDSL 설정
    implementation 'com.querydsl:querydsl-jpa:5.1.0:jakarta'
    annotationProcessor "com.querydsl:querydsl-apt:5.1.0:jakarta"
    annotationProcessor "jakarta.annotation:jakarta.annotation-api"
    annotationProcessor "jakarta.persistence:jakarta.persistence-api"

    // Environment Configuration
    implementation 'me.paulschwarz:spring-dotenv:4.0.0'

    // JWT
    implementation 'io.jsonwebtoken:jjwt-api:0.12.5'
    runtimeOnly 'io.jsonwebtoken:jjwt-impl:0.12.5'
    runtimeOnly 'io.jsonwebtoken:jjwt-jackson:0.12.5'

    // API Documentation
    implementation 'org.springdoc:springdoc-openapi-starter-webmvc-ui:2.6.0'

    // Lombok
    compileOnly 'org.projectlombok:lombok'
    annotationProcessor 'org.projectlombok:lombok'

    // Utilities
    implementation 'org.apache.commons:commons-lang3:3.18.0'

    // Web3
    implementation 'org.web3j:core:5.0.2'

    // Database
    runtimeOnly 'org.postgresql:postgresql'

    // Flyway (Database Migration)
    implementation 'org.flywaydb:flyway-core'
    implementation 'org.flywaydb:flyway-database-postgresql'

    // Development
    developmentOnly 'org.springframework.boot:spring-boot-devtools'

    // Testing
    testImplementation 'org.springframework.boot:spring-boot-starter-test'
    testImplementation 'org.springframework.security:spring-security-test'
    testImplementation 'io.rest-assured:rest-assured:5.3.0'
    testImplementation 'io.rest-assured:json-path:5.3.0'
    testRuntimeOnly 'com.h2database:h2'
    testRuntimeOnly 'org.junit.platform:junit-platform-launcher'

    // AWS
    implementation platform('software.amazon.awssdk:bom:2.27.21')
    implementation 'software.amazon.awssdk:s3'
}

spotless {
    java {
        googleJavaFormat()
        target 'src/main/java/**/*.java', 'src/test/java/**/*.java'
    }
}

checkstyle {
    toolVersion = '10.17.0'
    configFile = file("config/checkstyle/google_checks.xml")
}

jacoco {
    toolVersion = '0.8.12'
}

// 기본 test 태스크에서 @Tag("e2e") 태그가 붙은 테스트는 제외.
// ./gradlew test 실행 시 e2e테스트는 실행되지 않음.
tasks.named('test') {
    useJUnitPlatform {
        excludeTags 'e2e'
    }
    finalizedBy tasks.named('jacocoTestReport')
}

tasks.named('jacocoTestReport') {
    dependsOn tasks.named('test')
    reports {
        html.required = true
        xml.required = true
        csv.required = false
    }
}

// e2e테스트를 수행하기 위해서는 ./gradlew e2eTest 명령어를 실행해야함.
// ./gradlew test e2eTest 수행 시 기본 test 동작 이후에 e2e테스트가 실행됨.
tasks.register('e2eTest', Test) {
    description = 'Runs @Tag("e2e") integration tests against a real PostgreSQL instance.'
    group = 'verification'
    testClassesDirs = sourceSets.test.output.classesDirs
    classpath = sourceSets.test.runtimeClasspath
    useJUnitPlatform {
        includeTags 'e2e'
    }
    shouldRunAfter 'test'
}

tasks.named('check') {
    dependsOn "spotlessCheck"
    dependsOn "checkstyleMain"
    dependsOn "checkstyleTest"
}
